<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Reservasi - LinkU</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f9; color: #333; line-height: 1.6; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); padding: 30px; max-width: 450px; margin: 40px auto; text-align: center; }
        h3 { margin-top: 0; color: #007bff; }
        .status-badge { display: inline-block; padding: 6px 15px; border-radius: 20px; font-weight: bold; margin: 10px 0; }
        .status-accept { background-color: #d1fae5; color: #065f46; }
        .status-process { background-color: #fef3c7; color: #92400e; }
        .status-error { background-color: #fee2e2; color: #991b1b; }
        .hotel-name { font-size: 1.1em; font-weight: 600; margin: 15px 0; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .loading { color: #007bff; font-weight: bold; }
        .error-log { font-size: 11px; color: #999; margin-top: 20px; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 5px; display: none; word-break: break-all; }
        .btn-retry { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Detail Reservasi</h3>
        <div id="content">
            <p class="loading">⏳ Sedang mengambil data dari supplier...</p>
        </div>
        <div id="errorLog" class="error-log"></div>
    </div>

    <script>
        async function fetchDetail() {
            const content = document.getElementById('content');
            const errorLog = document.getElementById('errorLog');
            
            // 1. Ambil Parameter dari URL
            const urlParams = new URLSearchParams(window.location.search);
            const resNo = urlParams.get('no');
            // Jika Anda menambahkan os_ref_no di link email (opsional tapi disarankan)
            const osNo = urlParams.get('os') || ""; 

            if (!resNo) {
                content.innerHTML = `<p class="status-error">❌ Nomor reservasi tidak ditemukan di link.</p>`;
                return;
            }

            try {
                // 2. Fetch ke Backend
                // Menggunakan payload yang sama dengan handleSyncStatus di admin/history
                const response = await fetch('/api/hotels/booking-detail', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        reservationNo: resNo,
                        osRefNo: osNo,
                        forceResend: false // Set false agar tidak spam email setiap kali halaman dibuka
                    })
                });

                const result = await response.json();

                // 3. Log Error ke Konsol & Alert jika gagal (untuk debug)
                if (result.status !== "SUCCESS") {
                    console.error("Server Error Response:", result);
                    // Tampilkan detail error jika ada
                    errorLog.style.display = "block";
                    errorLog.innerHTML = `<b>Debug Info:</b> ${result.respMessage || 'Unknown Error'}`;
                }

                // 4. Render Interface berdasarkan Status
                if (result.status === "SUCCESS" && result.bookingDetail) {
                    const detail = result.bookingDetail;
                    const cleanStatus = (detail.bookingStatus || "").trim();
                    
                    let statusClass = 'status-process';
                    let statusText = cleanStatus;

                    if (cleanStatus === 'Accept') {
                        statusClass = 'status-accept';
                        statusText = '✅ Terkonfirmasi (Accept)';
                    } else if (cleanStatus.includes('Cancel')) {
                        statusClass = 'status-error';
                    }

                    content.innerHTML = `
                        <div class="status-badge ${statusClass}">${statusText}</div>
                        <p>No Reservasi: <b>${resNo}</b></p>
                        <div class="hotel-name">${detail.hotelName || 'Nama Hotel Tidak Tersedia'}</div>
                        <p style="font-size: 0.9em; color: #666;">${detail.roomName || ''}</p>
                        <hr>
                        ${cleanStatus === 'Accept' 
                            ? '<p>✨ Voucher telah dikirim ke email Anda. Silakan cek inbox atau folder spam.</p>' 
                            : '<p>⌛ Mohon tunggu, pesanan Anda sedang diproses oleh supplier.</p>'}
                        <a href="javascript:location.reload()" class="btn-retry">🔄 Refresh Status</a>
                    `;
                } else {
                    content.innerHTML = `
                        <p class="status-error">❌ Transaksi Tidak Ditemukan</p>
                        <p>${result.respMessage || 'Nomor reservasi mungkin salah atau belum terdaftar di sistem kami.'}</p>
                        <button class="btn-retry" onclick="location.reload()">Coba Lagi</button>
                    `;
                }
            } catch (error) {
                console.error("Connection Error:", error);
                alert("Gagal terhubung ke server: " + error.message);
                content.innerHTML = `
                    <p class="status-error">❌ Gangguan Koneksi</p>
                    <p>Gagal menghubungi server. Pastikan koneksi internet Anda stabil.</p>
                `;
            }
        }

        // Jalankan fungsi saat halaman dimuat
        window.onload = fetchDetail;
    </script>
</body>
</html>
