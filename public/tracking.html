<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Reservasi - LinkU</title>
    <style>
        :root { --primary: #24b3ae; --error: #ef4444; --warning: #f59e0b; --success: #10b981; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; padding: 20px; background-color: #f8fafc; color: #334155; line-height: 1.6; }
        .card { background: white; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); padding: 30px; max-width: 500px; margin: 40px auto; text-align: center; }
        h3 { margin-top: 0; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; font-weight: 800; }
        
        .status-badge { display: inline-block; padding: 10px 24px; border-radius: 30px; font-weight: bold; margin: 15px 0; text-transform: uppercase; font-size: 13px; letter-spacing: 0.5px; }
        .status-accept { background-color: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .status-process { background-color: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .status-error { background-color: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        
        .info-grid { text-align: left; background: #f8fafc; padding: 18px; border-radius: 12px; margin: 20px 0; border: 1px solid #e2e8f0; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 8px; }
        .info-row:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .label { color: #64748b; font-weight: 500; }
        .value { color: #0f172a; font-weight: 600; text-align: right; }

        .hotel-name { font-size: 1.25rem; font-weight: 700; color: #0f172a; margin: 10px 0 5px 0; }
        .room-name { font-size: 0.9rem; color: #64748b; margin-bottom: 15px; }
        
        .loading-spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-retry { background: var(--primary); color: white; border: none; padding: 14px 28px; border-radius: 10px; cursor: pointer; text-decoration: none; display: inline-block; font-weight: bold; transition: all 0.2s; width: 100%; box-shadow: 0 4px 6px -1px rgba(36, 179, 174, 0.3); }
        .btn-retry:hover { background: #1d9490; transform: translateY(-1px); }
        
        .debug-area { margin-top: 25px; text-align: left; }
        .debug-header { font-size: 11px; color: #94a3b8; cursor: pointer; display: flex; justify-content: space-between; align-items: center; padding: 5px; background: #f1f5f9; border-radius: 4px; }
        .debug-log { font-family: 'Courier New', Courier, monospace; font-size: 10px; color: #334155; background: #1e293b; color: #cbd5e1; padding: 12px; border-radius: 6px; display: none; overflow-x: auto; margin-top: 5px; white-space: pre-wrap; }
        .footer-note { font-size: 11px; color: #94a3b8; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="card">
        <h3>Detail Reservasi</h3>
        
        <div id="loader">
            <div class="loading-spinner"></div>
            <p style="color: #64748b;">Menghubungkan ke sistem Darmawisata...</p>
        </div>

        <div id="content" style="display: none;">
            </div>

       

        <p class="footer-note">© 2026 LinkU Nusantara • Layanan Perjalanan Terbaikmu</p>
    </div>

    <script>
        const debugLog = document.getElementById('debugLog');
        
        function log(msg, obj = null) {
            const timestamp = new Date().toLocaleTimeString();
            let text = `[${timestamp}] ${msg}\n`;
            if (obj) text += JSON.stringify(obj, null, 2) + "\n";
            debugLog.innerText += text;
            console.log(msg, obj);
        }

        function toggleDebug() {
            const isHidden = debugLog.style.display === "none" || debugLog.style.display === "";
            debugLog.style.display = isHidden ? "block" : "none";
            document.getElementById('debugToggleIcon').innerText = isHidden ? "▲" : "▼";
        }

        async function fetchDetail() {
            const content = document.getElementById('content');
            const loader = document.getElementById('loader');
            
            // 1. Ambil Parameter dari URL
            const urlParams = new URLSearchParams(window.location.search);
            const resNo = urlParams.get('no');
            const osNo = urlParams.get('os');
            const agentNo = urlParams.get('agent');

            log("Initializing fetch with params:", { resNo, osNo, agentNo });

            if (!resNo && !osNo) {
                loader.style.display = "none";
                content.style.display = "block";
                content.innerHTML = `<div class="status-error" style="padding:15px; border-radius:10px;">❌ Link tidak valid. Parameter tidak lengkap.</div>`;
                return;
            }

            try {
                // 2. Fetch ke Backend
                const response = await fetch('/api/hotels/booking-detail', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        reservationNo: resNo,
                        osRefNo: osNo,
                        agentOsRefNo: agentNo,
                        forceResend: false 
                    })
                });

                log("Response status:", response.status);
                const result = await response.json();
                log("Response data:", result);

                loader.style.display = "none";
                content.style.display = "block";

                if (result.status === "SUCCESS" && result.bookingDetail) {
                    const b = result.bookingDetail;
                    const cleanStatus = (b.bookingStatus || "").trim();
                    
                    let statusClass = 'status-process';
                    let statusLabel = 'Diproses';
                    let message = '⌛ Pesanan Anda sedang diproses oleh supplier. Silakan refresh berkala.';

                    if (cleanStatus === 'Accept') {
                        statusClass = 'status-accept';
                        statusLabel = 'Terkonfirmasi';
                        message = '✅ Voucher telah terbit! Silakan cek email Anda secara berkala.';
                    } else if (cleanStatus.toLowerCase().includes('cancel')) {
                        statusClass = 'status-error';
                        statusLabel = 'Dibatalkan';
                        message = '❌ Maaf, reservasi ini telah dibatalkan oleh sistem.';
                    }

                    content.innerHTML = `
                        <div class="status-badge ${statusClass}">${statusLabel}</div>
                        
                        <div class="hotel-name">${b.hotelName || 'Informasi Hotel'}</div>
                        <div class="room-name">${b.roomName || 'Sedang memuat detail kamar...'}</div>
                        
                        <div class="info-grid">
                            <div class="info-row">
                                <span class="label">ID LinkU</span>
                                <span class="value">${resNo || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="label">OS Ref (Vendor)</span>
                                <span class="value">${b.osRefNo || osNo || '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="label">Check-In</span>
                                <span class="value">${b.checkInDate ? b.checkInDate.split('T')[0] : '-'}</span>
                            </div>
                            <div class="info-row">
                                <span class="label">Voucher No</span>
                                <span class="value" style="color:var(--primary)">${b.voucherNo || 'Belum Terbit'}</span>
                            </div>
                        </div>

                        <p style="font-size: 14px; color: #475569; margin: 20px 0;">${message}</p>
                        
                        <button class="btn-retry" onclick="location.reload()">🔄 REFRESH STATUS</button>
                        <p style="font-size: 10px; color: #94a3b8; margin-top: 10px;">
                            Pembaruan Terakhir: ${new Date().toLocaleTimeString('id-ID')} WIB
                        </p>
                    `;
                } else {
                    log("Render error state - Data not found");
                    content.innerHTML = `
                        <div class="status-error" style="padding:15px; border-radius:10px; margin-bottom:15px;">
                            ❌ Data Belum Tersedia
                        </div>
                        <p style="font-size:14px; color: #64748b;">${result.respMessage || 'Sistem belum mendapatkan data dari supplier.'}</p>
                        <button class="btn-retry" onclick="location.reload()">Coba Lagi</button>
                    `;
                }

            } catch (error) {
                log("Fatal error in fetchDetail:", error.message);
                loader.style.display = "none";
                content.style.display = "block";
                content.innerHTML = `
                    <div class="status-error" style="padding:15px; border-radius:10px; margin-bottom:15px;">
                        ❌ Gangguan Koneksi
                    </div>
                    <p style="font-size:14px; color: #64748b;">Gagal terhubung ke server LinkU.</p>
                    <button class="btn-retry" onclick="location.reload()">Hubungkan Ulang</button>
                `;
            }
        }

        window.onload = fetchDetail;
    </script>
</body>
</html>
